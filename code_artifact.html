<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>次世代戰術空戰模擬器 (無限火力高超音速版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 軍事級 HUD 介面 */
        #hud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: #00ff44; text-shadow: 0 0 4px #00ff44; overflow: hidden; }
        
        /* 速度與高度 Tape */
        .hud-tape { position: absolute; top: 50%; transform: translateY(-50%); width: 60px; height: 300px; border: 1px solid rgba(0, 255, 68, 0.5); background: rgba(0, 20, 0, 0.2); overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #spd-tape { left: 5%; border-right: 3px solid #00ff44; }
        #alt-tape { right: 5%; border-left: 3px solid #00ff44; }
        .tape-value { font-size: 1.5rem; font-weight: bold; background: #000; padding: 2px 5px; border: 1px solid #00ff44; z-index: 2; }
        .tape-label { position: absolute; top: 10px; font-size: 0.8rem; font-weight: bold; opacity: 0.8; }

        #pitch-ladder { position: absolute; top: 50%; left: 50%; width: 200px; height: 800px; margin-top: -400px; margin-left: -100px; transform-origin: center center; }
        .pitch-line { position: absolute; left: 50%; transform: translateX(-50%); width: 120px; height: 2px; background: #00ff44; display: flex; justify-content: space-between; }
        .pitch-line::before, .pitch-line::after { content: attr(data-val); position: absolute; top: -15px; font-size: 12px; }
        .pitch-line::before { left: -25px; } .pitch-line::after { right: -25px; }
        .pitch-neg { background: transparent; border-top: 2px dashed #00ff44; }
        
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: -10px; width: 15px; height: 2px; background: #00ff44; }
        .crosshair::after { content: ''; position: absolute; top: 14px; right: -10px; width: 15px; height: 2px; background: #00ff44; }
        .crosshair-center { position: absolute; top: 10px; left: 14px; width: 2px; height: 10px; background: #00ff44; }

        .sys-panel { position: absolute; bottom: 30px; font-size: 0.9rem; line-height: 1.4; background: rgba(0,20,0,0.4); padding: 10px; border: 1px solid rgba(0,255,68,0.3); border-radius: 4px; }
        #sys-left { left: 5%; }
        #sys-right { right: 5%; text-align: right; }
        .warn-text { color: #ff3333; text-shadow: 0 0 5px #ff3333; animation: blink 0.3s infinite; }

        .target-box { position: absolute; width: 40px; height: 40px; border: 1px solid rgba(0,255,68,0.8); transform: translate(-50%, -50%); display: none; }
        .target-box::before { content: ''; position: absolute; top: -5px; left: -5px; width: 10px; height: 10px; border-top: 2px solid #00ff44; border-left: 2px solid #00ff44; }
        .target-box::after { content: ''; position: absolute; bottom: -5px; right: -5px; width: 10px; height: 10px; border-bottom: 2px solid #00ff44; border-right: 2px solid #00ff44; }
        .target-dist { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; }

        /* 控制器 UI */
        .ctrl { position: absolute; bottom: 30px; z-index: 100; touch-action: none; }
        #thr-area { left: 18%; width: 40px; height: 180px; background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 5px; }
        #thr-bar { position: absolute; bottom: 0; width: 100%; background: rgba(200,200,200,0.8); height: 70%; pointer-events: none; }
        #joy-area { right: 18%; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; }
        #joy-knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #fire-btn { right: 35%; bottom: 40px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,0,0,0.5); border: 2px solid #f00; color: #fff; line-height: 56px; text-align: center; font-weight: bold; cursor: pointer; }
        #msl-btn { right: 41%; bottom: 40px; width: 60px; height: 60px; border-radius: 50%; background: rgba(0,170,255,0.4); border: 2px solid #00aaff; color: #fff; line-height: 56px; text-align: center; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(0,170,255,0.5); }

        #stall-warning { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 3rem; font-weight: bold; display: none; z-index: 20; }
        #sonic-boom-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%); opacity: 0; pointer-events: none; z-index: 5; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container"></div>
<div id="sonic-boom-overlay"></div>

<div id="hud-layer">
    <div id="pitch-ladder"></div>
    <div class="crosshair"><div class="crosshair-center"></div></div>
    
    <div id="spd-tape" class="hud-tape">
        <div class="tape-label">CAS</div>
        <div class="tape-value" id="ui-spd">0</div>
    </div>
    
    <div id="alt-tape" class="hud-tape">
        <div class="tape-label">ALT</div>
        <div class="tape-value" id="ui-alt">0</div>
    </div>

    <div class="sys-panel" id="sys-left">
        <div>THR: <span id="ui-thr">70</span>%</div>
        <div>MACH: <span id="ui-mach">0.00</span></div>
        <div>G-LD: <span id="ui-gforce">1.0</span></div>
        <div>AOA:  <span id="ui-aoa">0.0</span>°</div>
    </div>

    <div class="sys-panel" id="sys-right">
        <div id="st-gear">GEAR: UP</div>
        <div id="st-brake">BRK: OFF</div>
        <div id="st-sas" class="text-green-400 font-bold">SMOOTH SAS: ON</div>
        <div style="margin-top:5px; color:#ffaa00;">GUN: 20MM</div>
        <div style="color:#00aaff;">MSL: <span id="ui-msl">∞</span></div>
        <div>SCORE: <span id="ui-score">0</span></div>
    </div>

    <div id="target-container"></div>
</div>

<div id="stall-warning" class="warn-text">PULL UP<br>STALL</div>

<div id="thr-area" class="ctrl"><div id="thr-bar"></div></div>
<div id="joy-area" class="ctrl"><div id="joy-knob"></div></div>
<div id="fire-btn" class="ctrl">FIRE</div>
<div id="msl-btn" class="ctrl">MSL</div>

<div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-50 pointer-events-auto">
    <h1 class="text-5xl font-bold text-white mb-2 tracking-widest uppercase">Tactical Flight Simulator</h1>
    <p class="text-green-400 font-bold mb-4">★ 已載入：高超音速 與 無限導彈系統 ★</p>
    <p class="text-gray-400 mb-8 text-sm max-w-lg text-center">W/S 或 ↑/↓ 俯仰 | A/D 或 ←/→ 滾轉<br>【太空鍵】機砲機槍 | 【F 鍵 / MSL按鈕】無限發射主動導引導彈</p>
    <button id="startBtn" class="bg-green-700 hover:bg-green-600 text-white font-bold py-3 px-8 rounded shadow-lg transition">SORTIE / 起飛</button>
</div>

<script>
    // --- 全域變數宣告 ---
    window.keys = {};
    window.input = { pitch: 0, roll: 0, yaw: 0 };
    var fireRate = 0.1; 

    const skyColorDay = new THREE.Color(0x4a80c4); 
    const skyColorSpace = new THREE.Color(0x020306); 

    let scene, camera, renderer, plane, clock;
    let throttle = 0.7;
    let gearDown = false, airBrake = false, sasEnabled = true; 
    const engines = [], surfaces = {}; 
    const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _v3 = new THREE.Vector3(), _q1 = new THREE.Quaternion(), _q2 = new THREE.Quaternion();

    // 氣動參數 (高超音速優化)
    const aircraft = {
        mass: 16000,          
        maxThrust: 850000,    // 強化發動機推力
        wingSpan: 13.5,         
        baseCd: 0.02,        
        parts: [
            { id: "wingL", area: 30, pos: new THREE.Vector3(-3.5, 0, 1), stall: 25, slope: 0.1, type: "wing", axis: "roll", mult: -1 },
            { id: "wingR", area: 30, pos: new THREE.Vector3(3.5, 0, 1), stall: 25, slope: 0.1, type: "wing", axis: "roll", mult: 1 },
            { id: "elevator", area: 18, pos: new THREE.Vector3(0, 0, 8.5), stall: 25, slope: 0.12, type: "tail", axis: "pitch", mult: 1 },
            { id: "rudder", area: 12, pos: new THREE.Vector3(0, 2.5, 8), stall: 25, slope: 0.08, type: "fin", axis: "yaw", mult: 1 }
        ]
    };

    let velocity = new THREE.Vector3(0, 0, -500); // 高初始速度
    let angularVel = new THREE.Vector3(0, 0, 0); 

    let bullets = [], targets = [], trails = [], explosions = [];
    let score = 0, lastFireTime = 0, isFiring = false;

    // 導彈系統變數
    let missiles = [];
    const domTargetContainer = document.getElementById('target-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = skyColorDay.clone();
        scene.fog = new THREE.FogExp2(skyColorDay.getHex(), 0.0001); 
        clock = new THREE.Clock();

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 300000);
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        
        document.getElementById('game-container').appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xfff5e6, 1.8);
        sun.position.set(5000, 8000, 3000);
        scene.add(sun);
        
        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x2e352b, 0.6); 
        scene.add(hemiLight);

        createStealthJet();
        createProceduralTerrain();
        createPitchLadder();
        setupEvents();

        plane.position.set(0, 3000, 0); 
        animate();
    }

    function createStealthJet() {
        plane = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x3d434a, metalness: 0.3, roughness: 0.7 });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x111115, metalness: 0.9, roughness: 0.1 });

        const bodyGeo = new THREE.CylinderGeometry(1.2, 1.8, 16, 6);
        bodyGeo.rotateX(Math.PI/2);
        const body = new THREE.Mesh(bodyGeo, mat);
        body.scale.set(1, 0.5, 1); 
        plane.add(body);

        const noseGeo = new THREE.ConeGeometry(1.2, 5, 6);
        noseGeo.rotateX(-Math.PI/2);
        const nose = new THREE.Mesh(noseGeo, mat);
        nose.position.z = -10.5; nose.scale.set(1, 0.5, 1);
        plane.add(nose);

        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 4), glassMat);
        cockpit.position.set(0, 0.6, -4);
        plane.add(cockpit);

        surfaces.elevator = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 3.5), mat);
        surfaces.elevator.position.set(0, 0, 7.5);
        plane.add(surfaces.elevator);

        const wingShape = new THREE.Shape();
        wingShape.moveTo(0, 0); wingShape.lineTo(13, 6); wingShape.lineTo(9, 10); wingShape.lineTo(0, 9);
        const wingL = new THREE.Mesh(new THREE.ExtrudeGeometry(wingShape, { depth: 0.15, bevelEnabled: false }), mat);
        wingL.rotation.x = Math.PI/2; wingL.position.set(1, 0, 0);
        const wingR = wingL.clone(); wingR.scale.x = -1; wingR.position.x = -1;
        plane.add(wingL, wingR);

        const tailGeo = new THREE.BoxGeometry(0.2, 3.5, 3.5);
        const tailL = new THREE.Mesh(tailGeo, mat); tailL.position.set(1.5, 1.2, 7.5); tailL.rotation.z = 0.4;
        const tailR = tailL.clone(); tailR.scale.x = -1; tailR.position.x = -1.5; tailR.rotation.z = -0.4;
        plane.add(tailL, tailR);

        [0.8, -0.8].forEach(x => {
            const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 2, 12), new THREE.MeshStandardMaterial({color: 0x111111}));
            nozzle.rotation.x = Math.PI/2; nozzle.position.set(x, 0, 8.5); plane.add(nozzle);

            const flame = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.3, 8, 16), new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.8 }));
            flame.rotation.x = Math.PI/2; flame.position.set(x, 0, 13);
            plane.add(flame); engines.push(flame);
        });

        scene.add(plane);
    }

    function pseudoNoise(x, z) {
        let n = Math.sin(x*0.0003) * Math.cos(z*0.0003) * 1500;
        n += Math.sin(x*0.001 + z*0.0015) * 400;
        return n;
    }

    function createProceduralTerrain() {
        const size = 100000;
        const segments = 100; 
        const geo = new THREE.PlaneGeometry(size, size, segments, segments);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position.array;
        const colors = [];
        const c = new THREE.Color();

        for (let i = 0; i < pos.length; i += 3) {
            let h = pseudoNoise(pos[i], pos[i+2]);
            if (h < 50) h = 50; 
            pos[i+1] = h;
            if (h > 800) c.setHex(0x5c5a55); 
            else if (h > 150) c.setHex(0x354a2b); 
            else c.setHex(0x283b1f); 
            colors.push(c.r, c.g, c.b);
        }

        geo.computeVertexNormals();
        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        const terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9, flatShading: true }));
        scene.add(terrain);
    }

    const pitchLadder = document.getElementById('pitch-ladder');
    function createPitchLadder() {
        pitchLadder.innerHTML = '';
        for (let i = 90; i >= -90; i -= 10) {
            if (i === 0) continue; 
            const line = document.createElement('div');
            line.className = `pitch-line ${i < 0 ? 'pitch-neg' : ''}`;
            line.setAttribute('data-val', Math.abs(i));
            line.style.top = `${400 - (i * 8)}px`; 
            pitchLadder.appendChild(line);
        }
    }

    function toggleGear() { 
        gearDown = !gearDown; 
        const el = document.getElementById('st-gear');
        if (el) { el.innerText = gearDown ? "GEAR: DOWN" : "GEAR: UP"; el.className = gearDown ? "warn-text font-bold" : ""; }
    }

    function toggleBrake() { 
        airBrake = !airBrake; 
        const el = document.getElementById('st-brake');
        if (el) { el.innerText = airBrake ? "BRK: ON" : "BRK: OFF"; el.className = airBrake ? "warn-text font-bold" : ""; }
    }

    function toggleSAS() { 
        sasEnabled = !sasEnabled; 
        const el = document.getElementById('st-sas');
        if (el) { el.innerText = sasEnabled ? "SMOOTH SAS: ON" : "SMOOTH SAS: OFF"; el.className = sasEnabled ? "text-green-400 font-bold" : "text-red-500 font-bold"; }
    }

    function setupEvents() {
        window.addEventListener('keydown', e => {
            if (!e.key) return;
            const k = e.key.toLowerCase();
            keys[k] = true;
            if(e.key === ' ') isFiring = true;
            if(k === 'f') fireMissile(); 
            if(k === 'g') toggleGear(); 
            if(k === 'b') toggleBrake(); 
            if(k === 'z') toggleSAS(); 
        });
        window.addEventListener('keyup', e => {
            if (!e.key) return;
            keys[e.key.toLowerCase()] = false;
            if(e.key === ' ') isFiring = false;
        });

        window.addEventListener('click', () => { window.focus(); });

        let thrActive = false;
        const thrArea = document.getElementById('thr-area');
        if (thrArea) {
            const handleThr = (e) => {
                const r = thrArea.getBoundingClientRect();
                throttle = Math.max(0, Math.min(1.2, 1.2 - (e.clientY - r.top)/r.height));
                const thrBar = document.getElementById('thr-bar');
                if (thrBar) thrBar.style.height = (Math.min(1, throttle/1.2)*100) + "%";
            };
            thrArea.addEventListener('pointerdown', e => { thrActive = true; handleThr(e); thrArea.setPointerCapture(e.pointerId); });
            thrArea.addEventListener('pointermove', e => { if(thrActive) handleThr(e); });
            thrArea.addEventListener('pointerup', () => thrActive = false);
        }

        let joyActive = false;
        const joyArea = document.getElementById('joy-area');
        const joyKnob = document.getElementById('joy-knob');
        if (joyArea && joyKnob) {
            const handleJoy = (e) => {
                const r = joyArea.getBoundingClientRect();
                const visualX = Math.max(-1, Math.min(1, (e.clientX - (r.left + r.width/2)) / (r.width/2)));
                const visualY = Math.max(-1, Math.min(1, (e.clientY - (r.top + r.height/2)) / (r.height/2)));
                joyKnob.style.transform = `translate(calc(-50% + ${visualX * 35}px), calc(-50% + ${visualY * 35}px))`;
                input.roll = -visualX * 0.35;
                input.pitch = -visualY * 0.3; 
            };
            const resetJoy = () => { joyActive = false; input.roll = 0; input.pitch = 0; joyKnob.style.transform = "translate(-50%, -50%)"; };
            joyArea.addEventListener('pointerdown', e => { joyActive = true; handleJoy(e); joyArea.setPointerCapture(e.pointerId); });
            joyArea.addEventListener('pointermove', e => { if(joyActive) handleJoy(e); });
            joyArea.addEventListener('pointerup', resetJoy);
            joyArea.addEventListener('pointercancel', resetJoy);
        }

        const fireBtn = document.getElementById('fire-btn');
        if (fireBtn) {
            fireBtn.addEventListener('pointerdown', () => isFiring = true);
            fireBtn.addEventListener('pointerup', () => isFiring = false);
        }

        const mslBtn = document.getElementById('msl-btn');
        if (mslBtn) { mslBtn.addEventListener('pointerdown', () => fireMissile()); }

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            window.focus(); 
        });
    }

    // 發射導彈 (無限連發改良版)
    function fireMissile() {
        const missileGrp = new THREE.Group();
        const bodyGeo = new THREE.CylinderGeometry(0.18, 0.18, 4, 8);
        bodyGeo.rotateX(Math.PI / 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        missileGrp.add(body);

        const noseGeo = new THREE.ConeGeometry(0.18, 0.8, 8);
        noseGeo.rotateX(-Math.PI / 2);
        const noseMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.z = -2.4;
        missileGrp.add(nose);

        const flameGeo = new THREE.CylinderGeometry(0.14, 0.02, 1.5, 8);
        flameGeo.rotateX(Math.PI / 2);
        const flameMat = new THREE.MeshBasicMaterial({ color: 0xff7700, transparent: true, opacity: 0.9 });
        const flame = new THREE.Mesh(flameGeo, flameMat);
        flame.position.z = 2.6;
        missileGrp.add(flame);

        missileGrp.position.copy(plane.position);
        missileGrp.quaternion.copy(plane.quaternion);
        missileGrp.translateY(-0.8);
        missileGrp.translateX(missiles.length % 2 === 0 ? 1 : -1);

        scene.add(missileGrp);

        let bestTarget = null;
        let minDist = Infinity;
        targets.forEach(t => {
            const d = missileGrp.position.distanceTo(t.mesh.position);
            if (d < minDist) { minDist = d; bestTarget = t; }
        });

        missiles.push({
            mesh: missileGrp,
            target: bestTarget ? bestTarget.mesh : null,
            velocity: new THREE.Vector3(0, 0, -3000).applyQuaternion(plane.quaternion), 
            life: 5.0, 
            flame: flame
        });
    }

    function spawnExplosion(pos) {
        const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(8, 1), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 1 }));
        mesh.position.copy(pos); scene.add(mesh); explosions.push({ mesh: mesh, life: 1.0, scale: 1 });
    }

    function spawnMissileSmoke(pos) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 4, 4), new THREE.MeshBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.4 }));
        mesh.position.copy(pos); scene.add(mesh); trails.push({ mesh: mesh, life: 0.6 });
    }

    function updatePhysics(dt) {
        if (keys['shift']) throttle = Math.min(1.2, throttle + 0.6 * dt);
        if (keys['control']) throttle = Math.max(0, throttle - 0.6 * dt);
        const thrBar = document.getElementById('thr-bar');
        if (thrBar) thrBar.style.height = (Math.min(1, throttle/1.2)*100) + "%";

        const altitudeM = plane.position.y;
        const airDensity = 1.225 * Math.exp(-altitudeM / 8500); 
        const speedOfSound = 340; 
        
        const altRatio = Math.min(1, Math.max(0, altitudeM / 30000));
        scene.background.lerpColors(skyColorDay, skyColorSpace, altRatio);
        scene.fog.color.copy(scene.background);
        scene.fog.density = 0.00015 * (1 - altRatio); 

        const localVel = velocity.clone().applyQuaternion(_q1.copy(plane.quaternion).invert());
        const speedKTS = localVel.length() * 1.94;
        const dynamicP = 0.5 * airDensity * localVel.lengthSq();
        
        const aoa = Math.atan2(localVel.y, -localVel.z) * (180/Math.PI);
        const slip = Math.atan2(localVel.x, -localVel.z) * (180/Math.PI);

        let rawPitch = (keys['w'] || keys['arrowup'] ? -0.3 : keys['s'] || keys['arrowdown'] ? 0.3 : 0) + input.pitch;
        let rawRoll = (keys['d'] || keys['arrowright'] ? 0.35 : keys['a'] || keys['arrowleft'] ? -0.35 : 0) + input.roll;

        if (surfaces.elevator) surfaces.elevator.rotation.x = rawPitch * 0.4;

        let totalForceLocal = new THREE.Vector3();
        let totalTorqueLocal = new THREE.Vector3();

        aircraft.parts.forEach(part => {
            let ctrl = 0;
            if(part.axis === "pitch") ctrl = rawPitch * 15 * part.mult;
            if(part.axis === "roll") ctrl = rawRoll * 15 * part.mult;
            let localAoA = (part.type === "fin" ? slip : aoa) + ctrl;
            let cl = localAoA * part.slope;
            let forceMag = cl * dynamicP * part.area;
            let fVec = _v1.set(part.type==="fin"?-forceMag:0, part.type!=="fin"?forceMag:0, 0);
            totalForceLocal.add(fVec);
            totalTorqueLocal.add(_v2.crossVectors(part.pos, fVec));
        });

        let drag = (aircraft.baseCd + 0.015 * Math.abs(aoa)) * dynamicP * 65; 
        totalForceLocal.z += drag; 
        
        const airDensityRatio = airDensity / 1.225; 
        let actualThrust = throttle * aircraft.maxThrust * Math.max(0.05, airDensityRatio);
        totalForceLocal.z -= actualThrust;

        angularVel.x *= 0.72; angularVel.y *= 0.62; angularVel.z *= 0.72;
        angularVel.x += (totalTorqueLocal.x / (aircraft.mass * 8)) * dt;
        angularVel.y += (totalTorqueLocal.y / (aircraft.mass * 6)) * dt;
        angularVel.z += (totalTorqueLocal.z / (aircraft.mass * 4)) * dt;
        angularVel.clampLength(0, 1.4); 

        const deltaRotation = _q2.setFromEuler(new THREE.Euler(angularVel.x * dt, angularVel.y * dt, angularVel.z * dt, 'YXZ'));
        plane.quaternion.multiply(deltaRotation).normalize();

        const forceWorld = totalForceLocal.applyQuaternion(plane.quaternion);
        forceWorld.y -= aircraft.mass * 9.81; 
        velocity.addScaledVector(forceWorld.divideScalar(aircraft.mass), dt);
        
        if (speedKTS > 20) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
            const speedVal = velocity.length();
            velocity.copy(forward).multiplyScalar(speedVal);
        }

        if (velocity.length() > 2500) { velocity.setLength(2500); }
        
        plane.position.addScaledVector(velocity, dt);
        if(plane.position.y < 80) plane.position.y = 80;

        const gForce = (totalForceLocal.y / (aircraft.mass * 9.81)) + 1;

        document.getElementById('ui-spd').innerText = Math.round(speedKTS);
        document.getElementById('ui-alt').innerText = Math.round(plane.position.y * 3.28); 
        document.getElementById('ui-thr').innerText = Math.round((throttle/1.2)*100);
        document.getElementById('ui-gforce').innerText = gForce.toFixed(1);
        document.getElementById('ui-mach').innerText = (localVel.length() / 340).toFixed(2);
        document.getElementById('ui-aoa').innerText = aoa.toFixed(1);

        const forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
        const rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(plane.quaternion);
        const pitchDeg = THREE.MathUtils.radToDeg(Math.asin(forwardVec.y));
        const rollDeg = THREE.MathUtils.radToDeg(Math.atan2(rightVec.y, Math.sqrt(rightVec.x * rightVec.x + rightVec.z * rightVec.z)));
        if (pitchLadder) pitchLadder.style.transform = `rotate(${-rollDeg}deg) translateY(${pitchDeg * 8}px)`; 
    }

    function updateCombat(dt) {
        if (isFiring && clock.getElapsedTime() - lastFireTime > fireRate) {
            lastFireTime = clock.getElapsedTime();
            const bullet = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 15, 4), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
            bullet.position.copy(plane.position); bullet.quaternion.copy(plane.quaternion);
            bullet.translateZ(-10); bullet.userData = { life: 2.0 };
            scene.add(bullet); bullets.push(bullet);
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i]; b.translateZ(-6000 * dt); b.userData.life -= dt;
            if (b.userData.life <= 0) { scene.remove(b); bullets.splice(i, 1); }
        }

        for (let i = missiles.length - 1; i >= 0; i--) {
            const m = missiles[i];
            m.life -= dt;

            if (Math.random() < 0.8) spawnMissileSmoke(m.mesh.position);
            if (m.flame) m.flame.scale.set(0.8 + Math.random() * 0.4, 1.0 + Math.random() * 0.5, 0.8 + Math.random() * 0.4);

            if (m.target && m.target.parent) {
                _v3.subVectors(m.target.position, m.mesh.position).normalize();
                const targetRotation = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, -1), _v3);
                m.mesh.quaternion.slerp(targetRotation, 7.5 * dt); 
                m.velocity.set(0, 0, -3500).applyQuaternion(m.mesh.quaternion); 
            }

            m.mesh.position.addScaledVector(m.velocity, dt);

            let mslExploded = false;
            for (let j = targets.length - 1; j >= 0; j--) {
                const t = targets[j];
                if (m.mesh.position.distanceTo(t.mesh.position) < 60) {
                    spawnExplosion(t.mesh.position);
                    scene.remove(t.mesh); t.dom.remove(); targets.splice(j, 1);
                    score += 300; 
                    document.getElementById('ui-score').innerText = score;
                    mslExploded = true;
                    break;
                }
            }

            if (mslExploded || m.life <= 0) {
                if (m.life <= 0) spawnExplosion(m.mesh.position); 
                scene.remove(m.mesh);
                missiles.splice(i, 1);
                continue;
            }
        }

        if (targets.length < 3 && Math.random() < 0.02) {
            const droneGrp = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            droneGrp.add(new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 4), mat));
            droneGrp.position.copy(plane.position).add(_v1.set((Math.random()-0.5)*3000, (Math.random()-0.5)*1000, -6000 - Math.random()*2000).applyQuaternion(plane.quaternion));
            droneGrp.lookAt(plane.position);
            scene.add(droneGrp);
            const box = document.createElement('div'); box.className = 'target-box'; box.innerHTML = `<div class="target-dist"></div>`;
            if (domTargetContainer) domTargetContainer.appendChild(box);
            targets.push({ mesh: droneGrp, dom: box });
        }

        const frustum = new THREE.Frustum();
        frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));

        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i]; let hit = false;
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (bullets[j].position.distanceTo(t.mesh.position) < 50) {
                    scene.remove(bullets[j]); bullets.splice(j, 1); hit = true; break;
                }
            }
            if (hit) {
                spawnExplosion(t.mesh.position); scene.remove(t.mesh); t.dom.remove(); targets.splice(i, 1);
                score += 150; document.getElementById('ui-score').innerText = score; continue;
            }
            if (frustum.containsPoint(t.mesh.position)) {
                _v1.copy(t.mesh.position).project(camera);
                t.dom.style.display = 'block';
                t.dom.style.left = `${(_v1.x * .5 + .5) * window.innerWidth}px`;
                t.dom.style.top = `${(_v1.y * -.5 + .5) * window.innerHeight}px`;
                t.dom.querySelector('.target-dist').innerText = Math.round(plane.position.distanceTo(t.mesh.position) * 3.28);
            } else { t.dom.style.display = 'none'; }
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            const ex = explosions[i]; ex.life -= dt * 2; ex.scale += dt * 30; ex.mesh.scale.setScalar(ex.scale);
            if (ex.life <= 0) { scene.remove(ex.mesh); explosions.splice(i, 1); }
        }

        for (let i = trails.length - 1; i >= 0; i--) {
            const tr = trails[i]; tr.life -= dt * 2;
            tr.mesh.scale.setScalar(1 + (1 - tr.life) * 2);
            tr.mesh.material.opacity = tr.life * 0.4;
            if (tr.life <= 0) { scene.remove(tr.mesh); trails.splice(i, 1); }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);
        updatePhysics(dt);
        updateCombat(dt); 
        
        const camPos = _v1.set(0, 4, 32).applyMatrix4(plane.matrixWorld);
        camera.position.lerp(camPos, 0.3); 
        camera.lookAt(_v2.set(0, 1, -60).applyMatrix4(plane.matrixWorld));

        renderer.render(scene, camera);
    }

    init();
</script>
